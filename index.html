<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanoclean - خدمات التنظيف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0077b6, #00b4d8); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; max-width: 500px; width: 100%; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; border: 2px solid #90e0ef; }
        .logo { font-size: 50px; background: #caf0f8; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 15px; color: #0077b6; }
        h1 { color: #023e8a; font-size: 32px; margin-bottom: 0px; letter-spacing: 1px; }
        .sub { color: #0077b6; font-weight: bold; font-size: 16px; margin-top: -5px; margin-bottom: 20px; background: #e0fbfc; padding: 8px 20px; border-radius: 40px; display: inline-block; }
        .divider { height: 3px; background: linear-gradient(to right, #0077b6, #90e0ef); width: 60px; margin: 15px auto; border-radius: 10px; }
        .info { text-align: right; margin: 25px 0; background: #f8f9fa; padding: 15px; border-radius: 15px; }
        .info p { padding: 8px 0; border-bottom: 1px solid #eee; color: #333; }
        .info p:last-child { border-bottom: none; }
        .info strong { color: #023e8a; display: inline-block; width: 90px; }
        .status { background: #2ec4b6; color: white; padding: 8px 20px; border-radius: 40px; display: inline-block; font-size: 14px; font-weight: bold; margin: 10px 0; }
        .btn { display: inline-block; background: #023e8a; color: white; padding: 12px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 15px; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0077b6; transform: scale(1.05); }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
        .whatsapp { background: #25D366; margin-left: 10px; }
        .whatsapp:hover { background: #128C7E; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🧹</div>
        <h1>Nanoclean</h1>
        <span class="sub">📍 Annaba, Algérie · خدمات التنظيف</span>
        <div class="divider"></div>
        <div class="status">✅ مفتوح الآن</div>
        <div class="info">
            <p><strong>📍 العنوان:</strong> عنابة، الجزائر 23000</p>
            <p><strong>📞 الهاتف:</strong> 0657 30 26 02</p>
            <p><strong>✉️ البريد:</strong> nanou-milano@live.com</p>
        </div>
        <a href="tel:0657302602" class="btn">📞 اتصل الآن</a>
        <a href="https://wa.me/213657302602" class="btn whatsapp">💬 واتساب</a>
        <p class="footer">© 2026 Nanoclean - جميع الحقوق محفوظة</p>
    </div>
</body>
</html>
